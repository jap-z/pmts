<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCast 1D Backtest Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stat-value {
            font-size: 24px;
            font-weight: 800;
            margin-top: 5px;
            color: #e2e8f0;
        }
        .win-rate { color: #4ade80; }
        .chart-container {
            width: 100%;
            max-width: 1000px;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            height: 400px;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        button:hover { background: #7dd3fc; }
        button:disabled { background: #475569; cursor: not-allowed; }
        
        .log-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
            height: 200px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #10b981;
        }
        .log-line { margin: 2px 0; border-bottom: 1px dashed #1e293b; padding-bottom: 2px; }
        .log-long { color: #4ade80; }
        .log-short { color: #f87171; }
        .log-neutral { color: #94a3b8; }
    </style>
</head>
<body>

    <h1>FinCast 1D Backtest Engine</h1>
    
    <button id="startBtn" onclick="startBacktest()">START 365-DAY WALK-FORWARD TEST</button>

    <div class="stats-grid">
        <div class="stat-card">
            <div>Progress</div>
            <div class="stat-value" id="progressVal">0 / 365</div>
        </div>
        <div class="stat-card">
            <div>Total Trades</div>
            <div class="stat-value" id="tradesVal">0</div>
        </div>
        <div class="stat-card">
            <div>Win Rate</div>
            <div class="stat-value win-rate" id="winrateVal">0.0%</div>
        </div>
        <div class="stat-card">
            <div>Cumulative PnL</div>
            <div class="stat-value" id="pnlVal">0.00%</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="priceChart"></canvas>
    </div>

    <div class="log-container" id="logBox"></div>

    <script>
        let chart;
        const logBox = document.getElementById('logBox');

        function initChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Context (Historical)',
                            data: [],
                            borderColor: '#94a3b8',
                            borderWidth: 2,
                            tension: 0.1,
                            pointRadius: 0
                        },
                        {
                            label: 'FinCast Prediction',
                            data: [],
                            borderColor: '#38bdf8',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.1,
                            pointRadius: 3
                        },
                        {
                            label: 'Actual Future Price',
                            data: [],
                            borderColor: '#4ade80',
                            borderWidth: 2,
                            tension: 0.1,
                            pointRadius: 3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }
                    },
                    plugins: {
                        legend: { labels: { color: '#e2e8f0' } }
                    }
                }
            });
        }

        function logEvent(msg, type) {
            const div = document.createElement('div');
            div.className = 'log-line';
            if (type === 'LONG') div.classList.add('log-long');
            if (type === 'SHORT') div.classList.add('log-short');
            if (type === 'NEUTRAL') div.classList.add('log-neutral');
            div.innerText = msg;
            logBox.prepend(div);
        }

        function startBacktest() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "RUNNING...";
            logBox.innerHTML = '';
            logEvent("Connecting to FinCast Engine...", "NEUTRAL");

            const evtSource = new EventSource('/pmts/stream_backtest');
            
            evtSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                // Update stats
                document.getElementById('progressVal').innerText = `${data.step} / ${data.total_steps}`;
                document.getElementById('tradesVal').innerText = data.total_trades;
                document.getElementById('winrateVal').innerText = `${data.win_rate.toFixed(1)}%`;
                
                const pnlEl = document.getElementById('pnlVal');
                const pnlPct = data.cumulative_pnl * 100;
                pnlEl.innerText = `${pnlPct > 0 ? '+' : ''}${pnlPct.toFixed(2)}%`;
                pnlEl.style.color = pnlPct >= 0 ? '#4ade80' : '#f87171';

                // Log Trade
                if (data.trade_taken) {
                    const result = data.won ? 'WIN' : 'LOSS';
                    const pnlTrade = (data.trade_pnl * 100).toFixed(2);
                    logEvent(`[${data.timestamp}] SIGNAL: ${data.signal} | Result: ${result} (${pnlTrade}%)`, data.signal);
                } else {
                    logEvent(`[${data.timestamp}] SIGNAL: ${data.signal} | No trade`, "NEUTRAL");
                }

                // Update Chart
                // X-axis labels
                const allLabels = [...data.context_times, ...data.future_times];
                
                // Context line (ends at current time)
                const contextData = [...data.context_prices];
                for (let i=0; i<data.future_times.length; i++) contextData.push(null);
                
                // Prediction & Actual lines (starts exactly where context ends to connect the line)
                const lastContextPrice = data.base_price;
                const predData = [];
                const actualData = [];
                
                for (let i=0; i<data.context_times.length - 1; i++) {
                    predData.push(null);
                    actualData.push(null);
                }
                
                // Connecting point
                predData.push(lastContextPrice);
                actualData.push(lastContextPrice);
                
                // Future points
                predData.push(...data.predicted_prices);
                actualData.push(...data.actual_prices);

                chart.data.labels = allLabels;
                chart.data.datasets[0].data = contextData;
                chart.data.datasets[1].data = predData;
                chart.data.datasets[2].data = actualData;
                chart.update();

                if (data.step >= data.total_steps) {
                    evtSource.close();
                    document.getElementById('startBtn').innerText = "BACKTEST COMPLETE";
                    logEvent("--- BACKTEST FINISHED ---", "NEUTRAL");
                }
            };

            evtSource.onerror = function(err) {
                console.error("EventSource failed:", err);
                evtSource.close();
                document.getElementById('startBtn').innerText = "ERROR - CHECK LOGS";
                document.getElementById('startBtn').disabled = false;
            };
        }

        initChart();
    </script>
</body>
</html>
